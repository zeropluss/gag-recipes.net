<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="60" fill="#ffffff" rx="5"/>
  
  <!-- Logo Circle Background -->
  <circle cx="30" cy="30" r="25" fill="#69e4a5" stroke="#2d5a4a" stroke-width="2"/>
  
  <!-- Burger -->
  <g transform="translate(15, 15)">
    <!-- Burger bun top -->
    <ellipse cx="15" cy="8" rx="12" ry="6" fill="#f4a261" stroke="#2d5a4a" stroke-width="1.5"/>
    <!-- Sesame seeds -->
    <circle cx="10" cy="6" r="1" fill="#fff"/>
    <circle cx="15" cy="5" r="1" fill="#fff"/>
    <circle cx="20" cy="7" r="1" fill="#fff"/>
    
    <!-- Lettuce -->
    <ellipse cx="15" cy="14" rx="10" ry="3" fill="#90c695" stroke="#2d5a4a" stroke-width="1"/>
    
    <!-- Patty -->
    <ellipse cx="15" cy="18" rx="11" ry="4" fill="#8b4513" stroke="#2d5a4a" stroke-width="1"/>
    
    <!-- Burger bun bottom -->
    <ellipse cx="15" cy="24" rx="12" ry="5" fill="#deb887" stroke="#2d5a4a" stroke-width="1.5"/>
  </g>
  
  <!-- Carrot -->
  <g transform="translate(35, 18)">
    <!-- Carrot body -->
    <polygon points="0,20 3,0 6,20" fill="#ff6b35" stroke="#2d5a4a" stroke-width="1"/>
    <!-- Carrot lines -->
    <line x1="1" y1="5" x2="5" y2="5" stroke="#2d5a4a" stroke-width="0.5"/>
    <line x1="1" y1="10" x2="5" y2="10" stroke="#2d5a4a" stroke-width="0.5"/>
    <line x1="1" y1="15" x2="5" y2="15" stroke="#2d5a4a" stroke-width="0.5"/>
    
    <!-- Carrot leaves -->
    <path d="M1,-2 Q0,-5 2,-4 Q4,-6 3,-2" fill="#90c695" stroke="#2d5a4a" stroke-width="0.8"/>
    <path d="M3,-2 Q2,-5 4,-4 Q6,-6 5,-2" fill="#90c695" stroke="#2d5a4a" stroke-width="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d5a4a">GAG Recipes</text>
  <text x="70" y="40" font-family="Arial, sans-serif" font-size="10" fill="#666">Grow a Garden Guide</text>
</svg>
